services:
  - type: web
    name: iot-test-rig-dashboard
    env: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: INFLUX_URL
        sync: false
      - key: INFLUX_TOKEN
        sync: false
      - key: INFLUX_ORG
        sync: false
      - key: INFLUX_BUCKET
        sync: false
      - key: APP_SECRET
        sync: false
      - key: INGEST_API_KEY
        sync: false
      - key: CLIENT_ORIGIN
        sync: false